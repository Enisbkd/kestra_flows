id: op_04_regions
namespace: opera.cloud

inputs:
  - id: chain_code
    type: STRING
    defaults: SBMDEVE
  - id: from_update_date
    type: STRING
    defaults: 2021-01-01
  - id: to_update_date
    type: STRING
    defaults: 2028-01-01
  - id: hotel_id
    type: STRING
    defaults: HPDEV

tasks:
  - id: run
    type: io.kestra.plugin.core.flow.Subflow
    namespace: opera.cloud
    flowId: generic-fetch-and-publish
    wait: true
    inputs:
      chain_code: "{{ inputs.chain_code }}"
      from_update_date: "{{ inputs.from_update_date }}"
      to_update_date: "{{ inputs.to_update_date }}"
      kafka_topic: "opera.regions"
      data_root_key: "configurationResort"
      records_list_key: "configurationResort"
      record_key_field: "regionCode"
      gql_input_json: |
        {
        "resortDetailsResort": {
        "_eq": "{{inputs.hotel_id}}"
            }
        }

      graphql_query: |
        query configurationResortForREGION($limit: Int, $offset: Int, $input: ConfigurationResortQueryArgumentsType!) {
          configurationResort(limit: $limit, offset: $offset, input: $input) {
            membershipPointsDetails {
              description
            }
            propertyPropertyDetails {
              regionCode
            }
          }
        }