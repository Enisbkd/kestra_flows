id: opera-financialtransactions-fetch-and-publish-with-generic
namespace: opera.cloud

inputs:
  - id: from_update_date
    type: STRING
    defaults: 2021-01-01
  - id: to_update_date
    type: STRING
    defaults: 2028-01-01

tasks:
  - id: run
    type: io.kestra.plugin.core.flow.Subflow
    namespace: opera.cloud
    flowId: generic-fetch-and-publish
    wait: true
    inputs:
      from_update_date: "{{ inputs.from_update_date }}"
      to_update_date: "{{ inputs.to_update_date }}"
      kafka_topic: "opera.financial-transactions"
      data_root_key: "financialTransactionDetails"
      record_key_field: "financialTransactionDetails.trxNo"
      gql_input_json: |
        {
          "financialtransDetailsResort": {"_in": ["HPDEV"]},
          "financialtransDetailsBusinessDate": {
            "_gte": "{{ inputs.from_update_date }}",
            "_lte": "{{ inputs.to_update_date }}"
          }
        }
      graphql_query: "{{ read('graphql/financial_transactions.graphql') }}"