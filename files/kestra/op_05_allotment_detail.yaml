id: op_05_allotment_detail
namespace: opera.cloud
inputs:
  - id: chain_code
    type: STRING
    defaults: SBMDEVE
  - id: from_update_date
    type: STRING
    defaults: "2021-01-01 00:00:00"
  - id: to_update_date
    type: STRING
    defaults: "2028-01-01 00:00:00"
tasks:
  - id: run
    type: io.kestra.plugin.core.flow.Subflow
    namespace: opera.cloud
    flowId: op_02_generic_fetch_and_publish
    wait: true
    inputs:
      chain_code: "{{inputs.chain_code}}"
      from_update_date: "{{ inputs.from_update_date }}"
      to_update_date: "{{ inputs.to_update_date }}"
      kafka_topic: "opera.bookings"
      record_key_field: "allotmentHeaderId"
      gql_input_json: |
        {
          "allotmentDetailsResort": {
            "_eq": "{{inputs.hotel_id}}"
          },
          "allotmentDetailsBeginDate": {
            "_gte": "2021-05-31"
          },
          "allotmentDetailsEndDate": {
            "_lte": "2026-04-01"
          }
        }
      graphql_query: "{{ read('graphql/05_ALLOTMENT_DETAIL.graphql') }}"
