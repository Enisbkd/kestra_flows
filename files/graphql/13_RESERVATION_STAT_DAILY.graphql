query bookingsReservationForRESERVATIONSTATDAILY($limit: Int, $offset: Int, $input: BookingsReservationQueryArgumentsType!) {
  bookingsReservation(limit: $limit, offset: $offset, input: $input) {
    accompanyingGuestDetails {
      birthDate
      nationality
    }
    fixedChargesDetails {
      businessDate
      endDate
    }
    locatorsDetails {
      beginDate
    }
    marketDetails {
      centralMarketGroupCode
    }profileAllInformationDetails {
      country
      state
      vIPCode
      vIPDescription
      nameTaxType
    }
    propertyPropertyDetails {
      maxAdultsInFamilyRoom
      maxChildrenInFamilyRoom
      regionCode
    }
    rateCodeDetails {
      centralSourceGroupCode
      dayUseYN
      houseUseYN
    }
    reservationDepositScheduleDetails {
      totalDepositPayments
    }
    reservationDetailDetails {
      allotmentHeaderId
      groupId
      resvStatus
      travelAgentId
    }
    reservationDetails {
      adults
      allotmentRecordType
      bookedRoomCategory
      cancellationDate
      cancelledBy
      centralProjectedTotalRevenue
      children
      companyID
      complimentaryYN
      contactProfileID
      insertDate
      marketCode
      membershipId
      numberOfRooms
      originalEndDate
      rateCode
      registrationCardNo
      repChannel
      resort
      resvNameid
      revenueTypeCode
      room
      roomCategory
      roomClass
      roomRevenue
      sourceCode
      sourceProfileID
      totalRevenue
      walkInYN
    }
    roomCategoryDetails {
      pseudoRoomType
      pseudoRoomYN
    }
    rotationPointAdjustments {
      numberOfNights
    }
  }
}
