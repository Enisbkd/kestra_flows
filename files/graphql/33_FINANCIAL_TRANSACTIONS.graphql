query FinancialTransactionDetails(
  $input: FinancialTransactionDetailsQueryArgumentsType!
  $limit: Int
  $offset: Int
) {
  financialTransactionDetails(limit: $limit, offset: $offset, input: $input) {

    financialTransactionDetails {
      aRLedgerCredit
      aRLedgerDebit
      aRState
      arrangementId
      fiscalBillNo
      businessDate
      cashierCredit
      cashierDebit
      cashierID
      cashierOpeningBalance
      checkNumber
      currencyCode
      depositLedgerCredit
      depositLedgerDebit
      exchangeRate
      financialDmlSeqNumber
      folioNo
      folioType
      folioView
      transferfromresvid
      ftSubtype
      grossAmount
      guestAccountLedgerCredit
      guestAccountLedgerDebit
      hotelAcct
      insertDate
      insertUser
      invoiceCloseDate
      invoiceType
      marketCode
      membershipID
      nameId
      netAmount
      numberDialed
      orgPostedAmount
      originalRoom
      packageAllowance
      packageArrangementCode
      package
      packageTrxType
      postingDate
      postingType
      pricePerUnit
      quantity
      rateCode
      associatedReceiptNo
      receiptType

      # mapping fix: REVENUE_AMT
      revenueAmount

      roomClass
      routingInstrnId
      sourceCode
      sourceCommissionNetYn
      taCommissionNetYn
      targetResort
      taxGeneratedYN
      taxInclusiveYN
      tcGroup
      tcSubgroup
      tranActionId
      trxCode
      trxNo
      trxNoAgainstPackage
      updateDate
      updateUser

      # mapping fix: TRX_DATE
      transactionPostingDate
    }

    # fields coming from mapping but not in the main FT node
    reservationDetails {
      resort
      resvNameid
      preference
    }

    roomDetails {
      room
      roomStatusRemarks
    }

    transactionCodeDetails {
      eInvoiceYn
    }

    rateCodeDetails {
      commissionableYn
    }

    folioTaxDetails {
      deposit
      taxAmount9
    }

    financialTransactionDetailsRecordCount
  }
}
