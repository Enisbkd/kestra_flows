query profilesIndividualsForPREFERENCES($limit: Int, $offset: Int, $input: ProfilesIndividualsQueryArgumentsType!) {
  profilesIndividuals(limit: $limit, offset: $offset, input: $input) {
    profileAllInformationDetails {
      aRCreditLimitYN
      chainCode
      description
      inactiveDate
      updateDate
      updateUser
    }
    profileCommunicationDetails {
      insertDate
      insertUser
    }
    profileDocumentsDetails {
      orderBy
    }
    profileKeywordsDetails {
      updateAllowedYn
    }
    profileNoteDetails {
      globalNoteYn
      resort
    }
    profilePreferenceDetails {
      canDeleteYn
      centralPreferenceCode
      externalPreferenceId
      preferenceTypeCode
    }
  }
}
