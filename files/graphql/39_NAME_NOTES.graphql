query profilesIndividualsForNAMENOTES($limit: Int, $offset: Int, $input: ProfilesIndividualsQueryArgumentsType!) {
  profilesIndividuals(limit: $limit, offset: $offset, input: $input) {
    profileAllInformationDetails {
      inactiveDate
      updateDate
      updateUser
    }
    profileCommunicationDetails {
      insertDate
      insertUser
    }
    profileNoteDetails {
      confidentialYN
      noteCode
      noteId
      noteInternalYN
      noteTitle
      notes
      resort
    }
    profilePreferenceDetails {
      nameId
    }
  }
}
