query profilesIndividualsForNAMEOWNER($limit: Int, $offset: Int, $input: ProfilesIndividualsQueryArgumentsType!) {
  profilesIndividuals(limit: $limit, offset: $offset, input: $input) {
    profileAddressDetails {
      primaryYN
    }
    profileAllInformationDetails {
      collectionUserId
      inactiveDate
    }
    profileNoteDetails {
      resort
    }
    profilePreferenceDetails {
      nameId
    }
  }
}
