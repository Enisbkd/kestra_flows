query aRAccountsReceivableForARACCOUNT($limit: Int, $offset: Int, $input: ARAccountsReceivableQueryArgumentsType!) {
  aRAccountsReceivable(limit: $limit, offset: $offset, input: $input) {
    accountDetails {
      accountStatus
      accountTypeId
      addressId
      balance
      emailId
      faxId
      inactiveDate
      insertDate
      lastActivityDate
      nameId
      phoneId
      primaryYn
      updateDate
    }
    propertyPropertyDetails {
      aRAccountNoFormat
    }
    profileAllInformationDetails {
      allResorts
    }
  }
}
