query profilesIndividualsForNAMEADDRESS($limit: Int, $offset: Int, $input: ProfilesIndividualsQueryArgumentsType!) {
  profilesIndividuals(limit: $limit, offset: $offset, input: $input) {
    profileAddressDetails {
      primaryYN
      province
    }
    profileAllInformationDetails {
      address1
      address2
      address3
      address4
      addressId
      addressType
      city
      country
      inactiveDate
      lastUpdatedResort
      postalCode
      state
      updateDate
      updateUser
    }
    profileCommunicationDetails {
      insertDate
      insertUser
    }
    profilePreferenceDetails {
      nameId
    }
  }
}
