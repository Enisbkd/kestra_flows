query profilesAccountsForNAMEPHONE($limit: Int, $offset: Int, $input: ProfilesAccountsQueryArgumentsType!) {
  profilesAccounts(limit: $limit, offset: $offset, input: $input) {
    profileAccountsDetails {
      inactiveDate
      nameId
      updateDate
      updateUser
    }
    profileCommunicationDetails {
      addressId
      beginDate
      defaultMethodYN
      displaySequence
      emailFormat
      endDate
      indexPhone
      insertDate
      insertUser
      phoneId
      phoneType
      primaryYN
    }
    profileForecastDetails {
      laptopChange
    }
  }
}
