query financialTransactionDetailsForBANKACCOUNT($limit: Int, $offset: Int, $input: FinancialTransactionDetailsQueryArgumentsType!) {
  financialTransactionDetails(limit: $limit, offset: $offset, input: $input) {
    financialTransactionDetails {
      accountCode
      accountid
    }
    reservationDetails {
      resort
    }
  }
}
