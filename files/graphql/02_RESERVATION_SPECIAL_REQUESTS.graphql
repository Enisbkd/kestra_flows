query aRLedgerForRESERVATIONSPECIALREQUESTS($limit: Int, $offset: Int, $input: ARLedgerQueryArgumentsType!) {
  aRLedger(limit: $limit, offset: $offset, input: $input) {
    aRLedgerDetails {
      comments
      insertDate
      insertUser
      updateDate
      updateUser
    }
    propertyPropertyDetails {
      externalSCYN
    }
    reservationDetails {
      dmlSeqNumber
      insertActionInstanceId
      preArrReviewedDt
      resort
      resvNameid
      sourceid
      specialRequest
    }
  }
}
