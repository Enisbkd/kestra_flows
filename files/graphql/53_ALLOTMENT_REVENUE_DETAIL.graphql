query statisticsReservationsSummaryForALLOTMENTREVENUEDETAIL($limit: Int, $offset: Int, $input: StatisticsReservationsSummaryQueryArgumentsType!) {
  statisticsReservationsSummary(limit: $limit, offset: $offset, input: $input) {
    reservationSummaryDetails {
      allotmentHeaderId
      consideredDate
    }
    reservationDetails {
      resort
      roomCategory
    }
  }
}
