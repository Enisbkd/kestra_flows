query profilesIndividualsForNAMEKEYWORDS($limit: Int, $offset: Int, $input: ProfilesIndividualsQueryArgumentsType!) {
  profilesIndividuals(limit: $limit, offset: $offset, input: $input) {
    profileKeywordsDetails {
      keyword
      keywordSoundex
      keywordType
    }
    profilePreferenceDetails {
      nameId
    }
  }
}
