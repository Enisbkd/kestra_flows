query cateringEventPostingsForGEMEVENTREVENUE($limit: Int, $offset: Int, $input: CateringEventPostingsQueryArgumentsType!) {
  cateringEventPostings(limit: $limit, offset: $offset, input: $input) {
    eventDetails {
      evResort
      evType
      expectedAttendees
      forecastRevenueOnlyYn
    }
    eventPostingDetails {
      bookId
      eventId
      revenueType
    }
  }
}
